<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Subvenciones</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#e0e0e0}
header{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);padding:20px 30px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.6em;color:#fff;font-weight:700;letter-spacing:1px}
.header-info{font-size:0.85em;color:#aaa}
.main-layout{display:flex;height:calc(100vh - 70px)}
.sidebar{width:320px;min-width:280px;background:rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:15px;border-bottom:1px solid rgba(255,255,255,0.08)}
.search-box{width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:0.85em;outline:none}
.search-box::placeholder{color:#888}
.filter-tabs{display:flex;gap:5px;margin-top:10px}
.filter-tab{flex:1;padding:5px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:transparent;color:#aaa;cursor:pointer;font-size:0.75em;text-align:center;transition:all 0.2s}
.filter-tab.active{background:#4a9eff;color:#fff;border-color:#4a9eff}
.client-list{flex:1;overflow-y:auto;padding:8px}
.client-item{padding:10px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all 0.2s;border:1px solid transparent}
.client-item:hover{background:rgba(74,158,255,0.1);border-color:rgba(74,158,255,0.3)}
.client-item.active{background:rgba(74,158,255,0.2);border-color:#4a9eff}
.client-name{font-size:0.85em;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-type{font-size:0.7em;color:#888;margin-top:2px}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:0.65em;font-weight:700}
.badge-soc{background:#1a4a7a;color:#7ab8f5}
.badge-fis{background:#2a4a1a;color:#8fd48b}
.content{flex:1;overflow-y:auto;padding:25px}
.welcome{text-align:center;padding:60px 20px;color:#888}
.welcome h2{font-size:1.8em;color:#4a9eff;margin-bottom:15px}
.welcome p{font-size:1em;line-height:1.6}
.client-detail{display:none}
.client-detail.show{display:block}
.detail-header{background:rgba(255,255,255,0.05);border-radius:12px;padding:20px 25px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
.detail-name{font-size:1.5em;font-weight:700;color:#fff;margin-bottom:8px}
.detail-meta{display:flex;gap:15px;flex-wrap:wrap}
.meta-item{font-size:0.82em;color:#aaa}
.meta-item span{color:#4a9eff;font-weight:600}
.section-title{font-size:0.9em;font-weight:700;color:#4a9eff;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:20px}
.subvenciones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:15px}
.subv-card{background:rgba(255,255,255,0.05);border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,0.08);transition:all 0.2s}
.subv-card:hover{border-color:rgba(74,158,255,0.4);background:rgba(74,158,255,0.08)}
.subv-name{font-size:0.88em;font-weight:600;color:#e0e0e0;margin-bottom:8px;line-height:1.4}
.subv-org{font-size:0.75em;color:#4a9eff;margin-bottom:4px}
.subv-details{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.subv-tag{font-size:0.7em;padding:2px 8px;border-radius:12px;background:rgba(255,255,255,0.08);color:#bbb}
.subv-tag.open{background:rgba(46,213,115,0.15);color:#2ed573}
.subv-tag.closed{background:rgba(255,71,87,0.15);color:#ff4757}
.stats-bar{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:rgba(255,255,255,0.05);border-radius:10px;padding:15px 20px;border:1px solid rgba(255,255,255,0.08);flex:1;min-width:130px;text-align:center}
.stat-num{font-size:1.8em;font-weight:700;color:#4a9eff}
.stat-label{font-size:0.75em;color:#888;margin-top:4px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
.count-badge{background:#4a9eff;color:#fff;border-radius:10px;padding:1px 7px;font-size:0.7em;margin-left:5px}
</style>
</head>
<body>
<header>
  <h1>&#128202; Dashboard de Subvenciones</h1>
  <div class="header-info">71 clientes &bull; 47 Sociedades &bull; 24 Personas F&#237;sicas</div>
</header>
<div class="main-layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search-box" id="searchBox" type="text" placeholder="Buscar cliente..." oninput="filterClients()">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">Todos <span class="count-badge" id="cntAll">71</span></button>
        <button class="filter-tab" onclick="setFilter('SOC',this)">Sociedades <span class="count-badge" id="cntSoc">47</span></button>
        <button class="filter-tab" onclick="setFilter('FIS',this)">F&#237;sicas <span class="count-badge" id="cntFis">24</span></button>
      </div>
    </div>
    <div class="client-list" id="clientList"></div>
  </div>
  <div class="content" id="mainContent">
    <div class="welcome" id="welcomeMsg">
      <h2>&#128204; Selecciona un cliente</h2>
      <p>Elige un cliente de la lista para ver las subvenciones disponibles seg&#250;n su actividad y perfil.</p>
    </div>
    <div class="client-detail" id="clientDetail">
      <div class="detail-header">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-meta">
          <div class="meta-item">Tipo: <span id="detailTipo"></span></div>
          <div class="meta-item">NIF: <span id="detailNif"></span></div>
          <div class="meta-item">Sector: <span id="detailSector"></span></div>
        </div>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div class="section-title">Subvenciones Compatibles</div>
      <div class="subvenciones-grid" id="subvGrid"></div>
    </div>
  </div>
</div><script>

SOC","nif":"B70487798","sector":"Forestal"},{"id":45,"name":"GUAVA BRANDS SL","tipo":"SOC","nif":"B56795354","sector":"Comercio"},{"id":46,"name":"GSV AGRO SL","tipo":"SOC","nif":"B70400932","sector":"Agricultura"},{"id":47,"name":"INTEGRAL ENERGETICA GALLEGA SL","tipo":"SOC","nif":"B70477385","sector":"Energía"},{"id":48,"name":"JAROVA LOGISTICA SL","tipo":"SOC","nif":"B94141256","sector":"Logística"},{"id":49,"name":"LEGUMBRES MORGADE NEGREIRA SLU","tipo":"SOC","nif":"B70512306","sector":"Alimentación"},{"id":50,"name":"LIDERA GALICIA SL","tipo":"SOC","nif":"B19822170","sector":"Servicios"},{"id":51,"name":"LIVING IN CALM CONSULTING SL","tipo":"SOC","nif":"B70464797","sector":"Consultoría"},{"id":52,"name":"MARIA ZAS MOBILIARIO SL","tipo":"SOC","nif":"B15841646","sector":"Comercio"},{"id":53,"name":"MEGOM BETANZOS SL","tipo":"SOC","nif":"B15263312","sector":"Construcción"},{"id":54,"name":"MFL PSICOLOGIA Y FORMACION SL","tipo":"SOC","nif":"B13720453","sector":"Formación"},{"id":55,"name":"MORGADE GESTAL SL","tipo":"SOC","nif":"B15371131","sector":"Hostelería"},{"id":56,"name":"NORMANSYS SL","tipo":"SOC","nif":"B70041066","sector":"Servicios"},{"id":57,"name":"PADEL BEER SL","tipo":"SOC","nif":"B70431762","sector":"Hostelería"},{"id":58,"name":"PILAR MORAN VIESCA SL","tipo":"SOC","nif":"B15723307","sector":"Servicios"},{"id":59,"name":"PROMOCIONES INMOBILIARIAS BUZACOS SL","tipo":"SOC","nif":"B70142765","sector":"Inmobiliario"},{"id":60,"name":"PROMOTORA CONSTRUCTORA CESCAM SL","tipo":"SOC","nif":"B70140579","sector":"Construcción"},{"id":61,"name":"RELATED INVESTMENT SLU","tipo":"SOC","nif":"B56176191","sector":"Inmobiliario"},{"id":62,"name":"SALA ATLANTIC SL","tipo":"SOC","nif":"B26804559","sector":"Hostelería"},{"id":63,"name":"SIEM CONSULT SLU","tipo":"SOC","nif":"B70460506","sector":"Consultoría"},{"id":64,"name":"SUMINISTROS NACIONALES E IMPORTACION SL","tipo":"SOC","nif":"B15064488","sector":"Comercio"},{"id":65,"name":"TAKE TWO GAL SL","tipo":"SOC","nif":"B56510233","sector":"Servicios"},{"id":66,"name":"TALLERES NOVO E HIJOS SL","tipo":"SOC","nif":"B15341175","sector":"Industria"},{"id":67,"name":"TRAPERIA PATRIMONIAL SL","tipo":"SOC","nif":"B42711929","sector":"Inmobiliario"},{"id":68,"name":"VEGASTUR CARNES ROXAS SL","tipo":"SOC","nif":"B74269655","sector":"Alimentación"},{"id":69,"name":"ZENTOASESORAMIENTO SLU","tipo":"SOC","nif":"B56957293","sector":"Asesoría"},{"id":70,"name":"ZONGALON SL","tipo":"SOC","nif":"B70422670","sector":"Servicios"},{"id":71,"name":"ZULIGAL SERVICIOS SL","tipo":"SOC","nif":"B13640628","sector":"Servicios"}
];



let currentFilter = 'all';
let selId = null;

function renderList() {
  const container = document.getElementById('clientList');
  const term = document.getElementById('searchBox').value.toLowerCase();
  container.innerHTML = '';
  
  const filtered = clients.filter(c => {
    const matchType = currentFilter === 'all' || c.tipo === currentFilter;
    const matchTerm = c.name.toLowerCase().includes(term) || c.nif.toLowerCase().includes(term);
    return matchType && matchTerm;
  });

  filtered.forEach(c => {
    const item = document.createElement('div');
    item.className = `client-item ${selId === c.id ? 'active' : ''}`;
    item.onclick = () => selectClient(c.id);
    item.innerHTML = `
      <div class="client-name">${c.name}</div>
      <div class="client-type"><span class="badge ${c.tipo==='SOC'?'badge-soc':'badge-fis'}">${c.tipo}</span> &bull; ${c.nif}</div>
    `;
    container.appendChild(item);
  });
}

function selectClient(id) {
  selId = id;
  const client = clients.find(c => c.id === id);
  document.getElementById('welcomeMsg').style.display = 'none';
  document.getElementById('clientDetail').classList.add('show');
  document.getElementById('detailName').innerText = client.name;
  document.getElementById('detailTipo').innerText = client.tipo === 'SOC' ? 'Sociedad' : 'Persona Física';
  document.getElementById('detailNif').innerText = client.nif;
  document.getElementById('detailSector').innerText = client.sector;
  
  // Stats
  const stats = document.getElementById('statsBar');
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-num">${Math.floor(Math.random()*20)+5}</div><div class="stat-label">Total Compatibles</div></div>
    <div class="stat-card"><div class="stat-num">${Math.floor(Math.random()*8)+1}</div><div class="stat-label">Urgentes</div></div>
    <div class="stat-card"><div class="stat-num">${(Math.random()*500).toFixed(1)}k€</div><div class="stat-label">Potencial Máx.</div></div>
  `;

  // Subvenciones (Mock data linked to real scraper results later)
  const grid = document.getElementById('subvGrid');
  grid.innerHTML = '';
  const mockSubv = [
    {titulo: "Kit Digital: Ayudas a la digitalización", org: "Red.es", estado: "Abierta"},
    {titulo: "Eficiencia Energética en PYME y Gran Empresa", org: "IDAE", estado: "Abierta"},
    {titulo: "Proyectos I+D Individuales", org: "CDTI", estado: "Abierta"},
    {titulo: "Ayudas a la Innovación y Sostenibilidad", org: "Ministerio Industria", estado: "Próxima"},
    {titulo: "Modernización de Flotas de Transporte", org: "Mitma", estado: "Cerrada"}
  ];

  mockSubv.forEach(s => {
    const card = document.createElement('div');
    card.className = 'subv-card';
    card.innerHTML = `
      <div class="subv-org">${s.org}</div>
      <div class="subv-name">${s.titulo}</div>
      <div class="subv-details">
        <span class="subv-tag ${s.estado==='Abierta'?'open':s.estado==='Cerrada'?'closed':''}">&#11044; ${s.estado}</span>
        <span class="subv-tag">Fondo Europeo</span>
      </div>
    `;
    grid.appendChild(card);
  });
  
  renderList();
}

function setFilter(type, el) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filterClients() {
  renderList();
}

window.onload = renderList;
</script>
</body>
</html>
