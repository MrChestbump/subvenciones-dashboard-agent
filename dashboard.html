<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Subvenciones 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0}
header{background:#1a1f2e;padding:14px 22px;border-bottom:1px solid #2d3748;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.15rem;font-weight:700;color:#63b3ed}
header p{font-size:0.73rem;color:#718096;margin-top:2px}
.badge{background:#2d3748;border-radius:20px;padding:4px 11px;font-size:0.68rem;color:#a0aec0}
.main{display:flex;height:calc(100vh - 56px)}
.sidebar{width:290px;background:#141821;border-right:1px solid #2d3748;display:flex;flex-direction:column}
.sh{padding:11px;border-bottom:1px solid #2d3748;position:sticky;top:0;background:#141821}
.sb{width:100%;background:#1a2035;border:1px solid #2d3748;border-radius:7px;padding:6px 10px;color:#e2e8f0;font-size:0.8rem;outline:none}
.sb:focus{border-color:#63b3ed}
.fr{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.fb{background:#1a2035;border:1px solid #2d3748;color:#a0aec0;border-radius:13px;padding:2px 9px;font-size:0.65rem;cursor:pointer}
.fb.active,.fb:hover{background:#2b4a7a;border-color:#63b3ed;color:#63b3ed}
.cl{flex:1;overflow-y:auto;padding:6px}
.cc{background:#1a2035;border:1px solid #2d3748;border-radius:8px;padding:10px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.cc:hover{border-color:#4a90d9;background:#1f2a45}
.cc.sel{border-color:#63b3ed;background:#1e3a5f}
.cn{font-weight:600;font-size:0.83rem}
.cm{font-size:0.69rem;color:#718096;margin-top:2px}
.ct{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.tag{border-radius:9px;padding:1px 7px;font-size:0.62rem;font-weight:600}
.ta{background:#1a3a2a;color:#68d391;border:1px solid #2f6b4a}
.ts{background:#1a2a4a;color:#63b3ed;border:1px solid #2a4a7a}
.tn{background:#2d2a1acolor:#f6ad55;border:1px solid #6b5a2a}
.detail{flex:1;overflow-y:auto;padding:16px;background:#0f1117}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#4a5568;text-align:center}
.ph-icon{font-size:2.8rem;margin-bottom:10px}
.dh{background:linear-gradient(135deg,#1a2035,#1e3a5f);border-radius:10px;padding:17px;margin-bottom:13px;border:1px solid #2d4a7a}
.dn{font-size:1.1rem;font-weight:700;color:#63b3ed}
.di{display:flex;gap:15px;margin-top:8px;flex-wrap:wrap}
.dii{font-size:0.75rem;color:#a0aec0}
.dii span{color:#e2e8f0;font-weight:500}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:11px}
.sc{background:#141821;border-radius:8px;padding:13px;border:1px solid #2d3748}
.sc.aplica{border-left:4px solid #68d391}
.sc.posible{border-left:4px solid #f6ad55}
.sc.no-aplica{border-left:4px solid #fc8181;opacity:.4}
.sch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.scn{font-weight:700;font-size:0.85rem}
.sco{font-size:0.66rem;color:#718096;margin-top:1px}
.scs{border-radius:13px;padding:2px 8px;font-size:0.64rem;font-weight:700;white-space:nowrap}
.ss-a{background:#1a3a2a;color:#68d391;border:1px solid #2f6b4a}
.ss-p{background:#2d2a1a;color:#f6ad55;border:1px solid #6b5a2a}
.ss-n{background:#2a1a1a;color:#fc8181;border:1px solid #6b2a2a}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a2035;font-size:0.74rem}
.sr:last-child{border-bottom:none}
.sr label{color:#718096}
.sr .value{color:#e2e8f0;font-weight:500;text-align:right}
.cuantia{color:#68d391!important;font-weight:700!important}
.mb{background:#0f1117;border-radius:5px;padding:7px;margin-top:7px;font-size:0.73rem;color:#a0aec0;border-left:3px solid #63b3ed;line-height:1.5}
.pl{color:#68d391}.pn{color:#f6ad55}.pu{color:#fc8181;font-weight:700}
.stitle{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#4a5568;margin:13px 0 7px}
</style>
</head>
<body>
<header>
<div><h1>Dashboard Subvenciones 2026</h1><p>Cruce Clientes x Líneas - Galicia, Diputación A Coruña, Asturias, Estatal</p></div>
<div class="badge">Mar 2026</div>
</header>
<div class="main">
<div class="sidebar">
<div class="sh">
<input class="sb" id="srch" placeholder="Buscar empresa o NIF..." oninput="fil()">
<div class="fr">
<button class="fb active" onclick="setF('todos',this)">Todos</button>
<button class="fb" onclick="setF('autonomo',this)">Autónomos</button>
<button class="fb" onclick="setF('sociedad',this)">Sociedades</button>
<button class="fb" onclick="setF('xunta',this)">Xunta</button>
<button class="fb" onclick="setF('pel',this)">PEL</button>
<button class="fb" onclick="setF('idepa',this)">IDEPA</button>
<button class="fb" onclick="setF('kit',this)">Kit Digital</button>
</div>
</div>
<div class="cl" id="clist"></div>
</div>
<div class="detail" id="dp">
<div class="ph"><div class="ph-icon">🔍</div><h2>Selecciona una empresa</h2><p style="margin-top:8px;font-size:0.8rem">Haz clic en cualquier cliente para ver sus subvenciones aplicables</p></div>
</div>
</div>
<script>var FA='todos',selId=null;var SI={TR341D:{n:'TR341D-Promoción Autoempleo',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'autonomo',i:'50-70%',m:'Hasta 12.000€ cuotas SS'},TR341Q:{n:'TR341Q-Inversión Modernización',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'autonomo',i:'60%',m:'Hasta 7.000€'},TR341R:{n:'TR341R-Conciliación',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'autonomo',i:'50%',m:'Subvención salario sustituto'},TR340E:{n:'TR340E-IEBT Base Tecnológica',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'startup',i:'Variable',m:'Cuantías variables I+D+i'},TR353D:{n:'TR353D-Transmisión Negocio',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'transmision',i:'---',m:'Hasta 30.000€'},TR880A:{n:'TR880A-Emprendimiento Reciente',o:'Xunta de Galicia',p:'30/09/2026',ptpl:'startup',i:'Variable',m:'Hasta 12.000€'},PEL:{n:'PEL Empleo 2026',o:'Diputación A Coruña',p:'Vigente 2026',ptpn:'empleo',i:'60% costes salariales',m:'Hasta 15.000€/contrato'},KITDIGITAL:{n:'Kit Digital Seg.III',o:'Red.es Ministerio',p:'Pendiente 2026',ptpn:'digital',i:'100% bonos',m:'Hasta 12.000€'},IGAPE:{n:'IGAPE-Internacionalización',o:'IGAPE Xunta',p:'Pendiente DOG',ptpn:'internacional',i:'40-50%',m:'50% costes intern.'}};var CL=[{id:1,n:'GONZALEZ ARVELO MANUEL JESUS',nif:'32972354Z',t:'autonomo',c:'6201-Prog.Informática',d:'A Coruña',tags:['xunta','pel','kit'],nota:'Alta 16/10/2023',s:[{id:'TR341D',e:'aplica',q:'7.500-12.000€',m:'Alta oct 2023. Menos de 3 años. Subvención inicio/cuotas SS.'},{id:'TR880A',e:'aplica',q:'Hasta 12.000€',m:'Emprendimiento reciente. Programa específico nuevos autónomos.'},{id:'TR341Q',e:'posible',q:'Hasta 7.000 60%',m:'Si invierte en TIC o software.'},{id:'PEL',e:'posible',q:'10.000-12.000€',m:'Si contrata indefinido en A Coruña.'},{id:'KITDIGITAL',e:'aplica',q:'Hasta 12.000€',m:'CNAE 6201 IT. CRM, ciberseguridad, web.'}]},{id:2,n:'SALA ATLANTIC S.L.',nif:'B26804559',t:'sociedad',c:'9329-Act.Recreativas',d:'Narón',tags:['xunta','pel'],nota:'Alta 09/03/2026',s:[{id:'TR341D',e:'aplica',q:'Cuotas SS 1ª contrat.',m:'Sociedad nueva mar 2026. Primera contratación o inversión inicial.'},{id:'TR340E',e:'posible',q:'Variable',m:'Si acredita base tecnológica.'},{id:'PEL',e:'aplica',q:'Hasta 12.000€',m:'Narón menos 20k hab. Contratación indefinida 2026.'}]},{id:3,n:'GUAVA BRANDS S.L',nif:'B56795354',t:'sociedad',c:'45114791-Comercio',d:'A Coruña',tags:['xunta','pel','kit'],nota:'Alta 10/01/2024',s:[{id:'TR341Q',e:'aplica',q:'Hasta 7.000 60%',m:'Inversión digitalización comercio, e-commerce, TPV.'},{id:'PEL',e:'posible',q:'Hasta 10.000€',m:'Si contrata indefinido con incremento empleo neto.'},{id:'KITDIGITAL',e:'posible',q:'Hasta 12.000€',m:'Si menos de 10 empleados. E-commerce, SEO.'}]},{id:4,n:'MFL PSICOLOGIA Y FORMACION S.L',nif:'B13720453',t:'sociedad',c:'Servicios prof.',d:'A Coruña',tags:['xunta','kit'],nota:'Alta 15/05/2023',s:[{id:'TR341D',e:'aplica',q:'Hasta 12.000€',m:'Menos de 3 años desde alta.'},{id:'TR341R',e:'aplica',q:'Salario sustituto',m:'Si contrata sustituto para conciliación.'},{id:'KITDIGITAL',e:'aplica',q:'Hasta 12.000€',m:'Aula virtual, gestión alumnos, LMS.'}]},{id:5,n:'BAO GOMEZ MARIA ANTONIA',nif:'32426994F',t:'autonomo',c:'8121-Limpieza',d:'Sada',tags:['xunta','pel'],nota:'Ingresos 133k',s:[{id:'TR341R',e:'aplica',q:'Salario sustituto',m:'Si contrata sustituto para conciliación.'},{id:'PEL',e:'aplica',q:'Hasta 12.000€',m:'Sada menos 20k hab. Contratación limpiador indefinido.'}]},{id:6,n:'CABOT GIL ADRIANA',nif:'47874514Z',t:'autonomo',c:'10715629-Panadería',d:'Arteixo',tags:['xunta','pel'],nota:'Ingresos 205k. Alta 2011',s:[{id:'TR341Q',e:'aplica',q:'Hasta 7.000 60%',m:'Inversión maquinaria panadería o equipamiento hostelería.'},{id:'PEL',e:'aplica',q:'Hasta 10.000€',m:'Arteixo. Contratación panadero o dependiente indefinido.'}]},{id:7,n:'FERNANDEZ ALDAO JORGE',nif:'53161737C',t:'autonomo',c:'53204741-Mensajería',d:'Arteixo',tags:['xunta','pel'],nota:'Doble actividad. Alta 2014',s:[{id:'TR341Q',e:'aplica',q:'Hasta 7.000 60%',m:'Inversión vehículos mensajería o TIC comercio.'},{id:'TR341R',e:'posible',q:'Salario sustituto',m:'Si contrata para conciliación.'},{id:'PEL',e:'aplica',q:'Hasta 10.000€',m:'Arteixo. Contratación repartidor indefinido.'}]}];function fil(){render()}function setF(f,b){FA=f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){var q=document.getElementById('srch').value.toLowerCase();var h='';var list=CL.filter(function(c){var mq=!q||(c.n.toLowerCase().indexOf(q)>-1|c.nif.toLowerCase().indexOf(q)>-1);var mf=FA=='todos'||FA=='autonomo'&&c.t=='autonomo'||FA=='sociedad'&&c.t=='sociedad'||c.tags.indexOf(FA)>-1;return mq&&mf});list.forEach(function(c){var tg=c.t=='autonomo'?'<span class="tag ta">Autónomo</span>':'<span class="tag ts">Sociedad</span>';tg+='<span class="tag tn">'+c.s.length+' subv.</span>';h+='<div class="cc'+(selId==c.id?' sel':'')+'" onclick="sel('+c.id+')"><div class="cn">'+c.n+'</div><div class="cm">'+c.nif+' • '+c.d+'</div><div class="ct">'+tg+'</div></div>'});if(!h)h='<div style="padding:16px;text-align:center;color:#4a5568">Sin resultados</div>';document.getElementById('clist').innerHTML=h}function sel(id){selId=id;render();var c=CL.filter(function(x){return x.id==id})[0];if(!c)return;var h='<div class="dh"><div class="dn">'+c.n+'</div><div class="di"><div class="dii">NIF: <span>'+c.nif+'</span></div><div class="dii">Domicilio: <span>'+c.d+'</span></div><div class="dii">Actividad: <span>'+c.c+'</span></div><div class="dii">Nota: <span>'+c.nota+'</span></div></div></div>';h+='<div class="stitle">Subvenciones ('+c.s.length+')</div><div class="sg">';c.s.forEach(function(sv){var info=SI[sv.id];if(!info){info={n:sv.id,o:'---',p:'---',ptpn:'---',i:'---',m:'---'}}var sc=sv.e=='aplica'?'aplica':(sv.e=='posible'?'posible':'no-aplica');var sl=sv.e=='aplica'?'ss-a':(sv.e=='posible'?'ss-p':'ss-n');var sl2=sv.e=='aplica'?'Aplica':'Condicionado';h+='<div class="sc '+sc+'"><div class="sch"><div><div class="scn">'+info.n+'</div><div class="sco">'+info.o+'</div></div><span class="scs '+sl+'">'+sl2+'</span></div><div class="sr"><label>Cuantía</label><value class="cuantia">'+sv.q+'</value></div><div class="sr"><label>Plazo</label><value>'+info.p+'</value></div><div class="sr"><label>Intensidad</label><value>'+info.i+'</value></div><div class="mb">'+sv.m+'</div></div>'});h+='</div>';document.getElementById('dp').innerHTML=h}render();
</script>
</body>
</html>
